<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#6d28d9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Logo symbol (flask/distillation icon) -->
  <g transform="translate(60, 180)">
    <rect width="90" height="90" rx="18" fill="url(#logoGradient)"/>
    <g transform="translate(45, 45)" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Flask body -->
      <path d="M -8,-22 L -8,-8 L -18,18 L 18,18 L 8,-8 L 8,-22" />
      <!-- Flask top -->
      <line x1="-12" y1="-22" x2="12" y2="-22" />
      <!-- Liquid level -->
      <path d="M -12,8 L 12,8" stroke-dasharray="3,3" />
      <!-- Droplet -->
      <circle cx="0" cy="0" r="3" fill="white" stroke="none" />
    </g>
  </g>

  <!-- Main heading -->
  <text x="180" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="700" fill="white" letter-spacing="-1">
    distill
  </text>

  <!-- Subtitle -->
  <text x="60" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0">
    Compact books into agent knowledge.
  </text>

  <!-- Feature highlights -->
  <g transform="translate(60, 350)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="100" height="36" rx="18" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="50" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#8b5cf6" text-anchor="middle">PDFs</text>

    <rect x="115" y="0" width="120" height="36" rx="18" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="175" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#7c3aed" text-anchor="middle">Markdown</text>

    <rect x="250" y="0" width="100" height="36" rx="18" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">Notion</text>

    <rect x="365" y="0" width="110" height="36" rx="18" fill="#1e293b" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="420" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#c4b5fd" text-anchor="middle">Web URLs</text>

    <!-- Row 2 -->
    <rect x="0" y="48" width="100" height="36" rx="18" fill="#1e293b" stroke="#ddd6fe" stroke-width="1.5"/>
    <text x="50" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#ddd6fe" text-anchor="middle">EPUBs</text>

    <rect x="115" y="48" width="110" height="36" rx="18" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
    <text x="170" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="600" fill="#c084fc" text-anchor="middle">GitHub</text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(580, 120)">
    <rect width="560" height="390" rx="12" fill="#0f1117" stroke="#2d3748" stroke-width="2"/>

    <!-- Code header -->
    <rect width="560" height="40" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Code content -->
    <text x="20" y="80" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#8b5cf6" font-weight="500">$ distill tao-of-react</text>
    <text x="20" y="108" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ source:   tao-of-react (pdf)</text>
    <text x="20" y="132" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ template: rules</text>
    <text x="20" y="156" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ agent:    claude-cli (sonnet)</text>
    <text x="20" y="180" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ Compacting (1 chunk)...</text>
    <text x="20" y="210" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#10b981">✓ Compaction complete.</text>
    <text x="20" y="234" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#10b981">→ tokens: 2847 (budget: 4000)</text>

    <text x="20" y="280" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#8b5cf6" font-weight="500">$ distill update --force</text>
    <text x="20" y="308" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ Re-compacting 4 sources...</text>
    <text x="20" y="332" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ tao-of-react:  ✓ 2847 tokens</text>
    <text x="20" y="356" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ tao-of-node:   ✓ 3102 tokens</text>
    <text x="20" y="380" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#10b981">✓ 4 sources updated.</text>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
